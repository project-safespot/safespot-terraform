name: Frontend Build 

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-deploy.yml"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2
  S3_BUCKET: ${{ secrets.FRONTEND_S3_BUCKET }}
  CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}

concurrency:
  group: frontend-deploy
  cancel-in-progress: false

jobs:
  # =========================================================================
  # build
  # =========================================================================
  build:
    name: Build frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.sha }}
          path: frontend/dist/
          retention-days: 1

  # =========================================================================
  # deploy
  #
  # index.html     → no-cache (항상 최신 진입점 보장)
  # 정적 assets   → 장기 캐시 (파일명에 hash 포함되어 있어 무효화 불필요)
  # invalidation   → /index.html 만 무효화
  # =========================================================================
  deploy:
    name: Deploy to S3
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.result == 'success'

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist-${{ github.sha }}
          path: dist/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.APP_AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: |
          # index.html 먼저 별도 업로드 (캐시 금지)
          aws s3 cp dist/index.html s3://${S3_BUCKET}/index.html \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html"

          # 나머지 정적 assets 동기화 (장기 캐시)
          aws s3 sync dist/ s3://${S3_BUCKET}/ \
            --delete \
            --exclude "index.html" \
            --cache-control "public, max-age=31536000, immutable"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" \
            --paths "/index.html"

      - name: Print deploy summary
        run: |
          echo "### ✅ Frontend Deploy Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "| 항목 | 값 |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${GITHUB_SHA::7}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| S3 Bucket | \`${S3_BUCKET}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| CloudFront | \`${CLOUDFRONT_DISTRIBUTION_ID}\` |" >> "$GITHUB_STEP_SUMMARY"