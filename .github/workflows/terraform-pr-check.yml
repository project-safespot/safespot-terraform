name: terraform-pr-check

on:
  pull_request:
    branches:
      - main
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-pr-check.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform:
    name: fmt / validate - ${{ matrix.name }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: network
            path: terraform/environments/dev/network
          - name: data
            path: terraform/environments/dev/data
          - name: api-service
            path: terraform/environments/dev/api-service
          - name: front-edge
            path: terraform/environments/dev/front-edge
          - name: async-worker
            path: terraform/environments/dev/async-worker
          - name: cicd
            path: terraform/environments/dev/cicd
          - name: observability
            path: terraform/environments/dev/observability

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      # fmt는 전체 terraform 디렉터리 대상으로 1회만 해도 되지만
      # matrix 구조상 각 환경에서 실행해도 중복 검사라 문제 없음
      - name: Terraform fmt
        id: fmt
        run: terraform fmt -check -recursive
        working-directory: terraform/
        continue-on-error: true

      # -backend=false: AWS 자격증명 없이 로컬 init만 수행
      - name: Terraform init
        id: init
        run: terraform init -backend=false -input=false
        working-directory: ${{ matrix.path }}

      - name: Terraform validate
        id: validate
        run: terraform validate -no-color
        working-directory: ${{ matrix.path }}
        continue-on-error: true

      - name: Comment result on PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fmt      = '${{ steps.fmt.outcome }}';
            const init     = '${{ steps.init.outcome }}';
            const validate = '${{ steps.validate.outcome }}';
            const env      = '${{ matrix.name }}';

            const icon = (s) => s === 'success' ? '✅' : '❌';

            const body = `## Terraform PR Check — ${env}

            | Step     | Result          |
            |----------|-----------------|
            | fmt      | ${icon(fmt)} ${fmt}           |
            | init     | ${icon(init)} ${init}         |
            | validate | ${icon(validate)} ${validate} |

            > plan은 main merge 후 terraform-plan workflow에서 실행됩니다.
            `;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number
            });

            const marker = `## Terraform PR Check — ${env}`;
            const existing = comments.data.find(c =>
              c.user.type === 'Bot' && c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo,
                issue_number,
                body
              });
            }

      - name: Fail if checks failed
        run: |
          if [ "${{ steps.fmt.outcome }}" != "success" ]; then
            echo "terraform fmt failed"
            exit 1
          fi
          if [ "${{ steps.validate.outcome }}" != "success" ]; then
            echo "terraform validate failed"
            exit 1
          fi