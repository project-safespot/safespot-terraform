name: terraform-pr-check

on:
  pull_request:
    branches:
      - main
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-pr-check.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform:
    name: terraform fmt / validate
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        root:
          - terraform/environments/dev/network
          - terraform/environments/dev/data
          - terraform/environments/dev/api-service/eks-core
          - terraform/environments/dev/api-service/eks-sg-rules
          - terraform/environments/dev/api-service/eks-irsa
          - terraform/environments/dev/api-service/eks-karpenter
          - terraform/environments/dev/api-service/eks-addons-irsa
          - terraform/environments/dev/api-service/eks-addons
          - terraform/environments/dev/api-service/eks-argocd-bootstrap
          - terraform/environments/dev/async-worker
          - terraform/environments/dev/front-edge
          - terraform/environments/dev/ops
          - terraform/environments/dev/cicd
          - terraform/environments/dev/ssm-parameters

    defaults:
      run:
        working-directory: ${{ matrix.root }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform fmt
        run: terraform fmt -check -recursive ../../../

      - name: Terraform init without backend
        run: terraform init -backend=false -input=false

      - name: Terraform validate
        run: terraform validate -no-color
