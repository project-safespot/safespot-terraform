{{- if .Values.nodePools.apiPublicRead.enabled }}
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: api-public-read
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  template:
    metadata:
      labels:
        role: {{ .Values.nodePools.apiPublicRead.nodeLabel }}
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: {{ .Values.nodeClass.name }}
      taints:
        - key: {{ .Values.nodePools.apiPublicRead.taint.key }}
          value: {{ .Values.nodePools.apiPublicRead.taint.value }}
          effect: {{ .Values.nodePools.apiPublicRead.taint.effect }}
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: {{ toJson .Values.nodePools.apiPublicRead.requirements.arch }}
        - key: kubernetes.io/os
          operator: In
          values: {{ toJson .Values.nodePools.apiPublicRead.requirements.os }}
        - key: karpenter.sh/capacity-type
          operator: In
          values: {{ toJson .Values.nodePools.apiPublicRead.requirements.capacityType }}
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values: {{ toJson .Values.nodePools.apiPublicRead.requirements.instanceCategory }}
        - key: karpenter.k8s.aws/instance-generation
          operator: Gt
          values: [{{ .Values.nodePools.apiPublicRead.requirements.instanceGeneration | quote }}]
  limits:
    cpu: {{ .Values.nodePools.apiPublicRead.limits.cpu | quote }}
    memory: {{ .Values.nodePools.apiPublicRead.limits.memory }}
  disruption:
    consolidationPolicy: {{ .Values.nodePools.apiPublicRead.disruption.consolidationPolicy }}
    consolidateAfter: {{ .Values.nodePools.apiPublicRead.disruption.consolidateAfter }}
{{- end }}
